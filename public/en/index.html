<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Groopay — Split expenses, settle up. Manage shared expenses with friends easily.">
  <meta name="theme-color" content="#4F46E5">
  <meta property="og:title" content="Groopay">
  <meta property="og:description" content="Split expenses, settle up.">
  <meta property="og:type" content="website">
  <title>Groopay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }
    .language-switcher {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      right: 20px;
      display: flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .language-link {
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }
    .language-link[aria-current="page"] { color: #4F46E5; background: #FFFFFF; }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      max-width: 400px;
      width: 100%;
    }
    .logo-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }
    .logo-letter { font-size: 64px; font-weight: 800; color: #FFFFFF; line-height: 1; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .title-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .title { font-size: 48px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; line-height: 1.1; }
    .subtitle { font-size: 18px; font-weight: 500; color: rgba(255, 255, 255, 0.8); line-height: 1.4; }
    .links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
    .link {
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 2px;
    }
    .link:hover { color: #FFFFFF; border-bottom-color: rgba(255, 255, 255, 0.6); }
    .app-store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 14px;
      padding: 14px 28px;
      color: rgba(255, 255, 255, 0.45);
      font: 600 16px 'Plus Jakarta Sans', sans-serif;
      opacity: 0.7;
    }
    .footer-note { font-size: 12px; color: rgba(255, 255, 255, 0.35); margin-top: -8px; }
    @media (max-width: 480px) {
      .container { gap: 24px; }
      .logo-circle { width: 96px; height: 96px; }
      .logo-letter { font-size: 52px; }
      .title { font-size: 40px; }
      .subtitle { font-size: 16px; }
      .links { gap: 16px; }
    }
  </style>
</head>
<body>
  <nav class="language-switcher" aria-label="Language selection">
    <a class="language-link" href="/" lang="tr">TR</a>
    <a class="language-link" href="/en" lang="en" aria-current="page">EN</a>
  </nav>
  <main class="container">
    <div class="logo-circle"><span class="logo-letter">G</span></div>
    <div class="title-group">
      <h1 class="title">Groopay</h1>
      <p class="subtitle">Split expenses, settle up</p>
    </div>
    <button class="app-store-btn" disabled aria-label="Coming soon to the App Store">
      Coming Soon to the App Store
    </button>
    <div class="links">
      <a class="link" href="/en/privacy">Privacy Policy</a>
      <a class="link" href="/en/terms">Terms of Service</a>
    </div>
    <p class="footer-note">&copy; 2026 Groopay</p>
  </main>
</body>
</html>
