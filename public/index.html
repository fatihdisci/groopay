<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Groopay — Masrafları böl, hesaplar netleşsin. Arkadaşlarınla grup harcamalarını kolayca yönet.">
  <meta name="theme-color" content="#4F46E5">
  <meta property="og:title" content="Groopay">
  <meta property="og:description" content="Masrafları böl, hesaplar netleşsin.">
  <meta property="og:type" content="website">
  <title>Groopay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      max-width: 400px;
      width: 100%;
    }

    .logo-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 2px solid rgba(255, 255, 255, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }

    .logo-letter {
      font-size: 64px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 1;
      user-select: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .title-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .title {
      font-size: 48px;
      font-weight: 800;
      color: #FFFFFF;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .subtitle {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.4;
    }

    .links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .link {
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s ease;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 2px;
    }

    .link:hover {
      color: #FFFFFF;
      border-bottom-color: rgba(255, 255, 255, 0.6);
    }

    .app-store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 14px;
      padding: 14px 28px;
      color: rgba(255, 255, 255, 0.45);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: not-allowed;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .app-store-btn svg {
      opacity: 0.5;
    }

    .footer-note {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      margin-top: -8px;
    }

    @media (max-width: 480px) {
      .container {
        gap: 24px;
      }

      .logo-circle {
        width: 96px;
        height: 96px;
      }

      .logo-letter {
        font-size: 52px;
      }

      .title {
        font-size: 40px;
      }

      .subtitle {
        font-size: 16px;
      }

      .links {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-circle">
      <span class="logo-letter">G</span>
    </div>

    <div class="title-group">
      <h1 class="title">Groopay</h1>
      <p class="subtitle">Masrafları böl, hesaplar netleşsin</p>
    </div>

    <button class="app-store-btn" disabled aria-label="App Store — yakında">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      App Store'da Yakında
    </button>

    <div class="links">
      <a class="link" href="/privacy">Gizlilik Politikası</a>
      <a class="link" href="/terms">Kullanım Koşulları</a>
    </div>

    <p class="footer-note">&copy; 2026 Groopay</p>
  </div>
</body>
</html>
